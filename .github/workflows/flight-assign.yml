name: flight-assign

on:
  schedule:
    # Every 15 minutes. GitHub cron is UTC; we filter to ATL shift hours
    # inside the program (roster.current_shift_key returns None outside
    # 05:30-22:00 ET), so off-hours runs are no-ops.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: flight-assign
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run flight-assign
        env:
          AEROVECT_CLIENT_ID: ${{ secrets.AEROVECT_CLIENT_ID }}
          AEROVECT_CLIENT_SECRET: ${{ secrets.AEROVECT_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          AIRPORT: ATL
          AIRLINE: DL
          HOURS_FORWARD: "9"
        run: flight-assign
