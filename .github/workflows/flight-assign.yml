name: flight-assign

on:
  schedule:
    # Backup schedule — primary trigger is cron-job.org. Every 15 min UTC.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: flight-assign
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run flight-assign
        env:
          AEROVECT_CLIENT_ID: ${{ secrets.AEROVECT_CLIENT_ID }}
          AEROVECT_CLIENT_SECRET: ${{ secrets.AEROVECT_CLIENT_SECRET }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_SCHEDULE_CHANNEL_ID: ${{ secrets.SLACK_SCHEDULE_CHANNEL_ID }}
          AIRPORT: ATL
          # AIRLINE intentionally not set — code defaults to "DL,DAL"
          # (Delta IATA + ICAO). Set this secret/var if you need to
          # restrict further or run a different carrier.
          HOURS_FORWARD: "2"
        run: flight-assign
